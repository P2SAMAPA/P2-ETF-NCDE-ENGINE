name: Daily Signal Update

on:
  schedule:
    - cron: '0 23 * * 1-5'   # 23:00 UTC Mon-Fri — 1hr after DeePM data update
  workflow_dispatch:          # manual trigger for testing

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_train.txt

      - name: Download trained models from HF
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_SIGNALS_REPO: P2SAMAPA/p2-etf-ncde-engine-signals
        run: |
          python - <<'EOF'
          import os, glob
          from huggingface_hub import hf_hub_download
          token = os.environ["HF_TOKEN"]
          repo  = os.environ["HF_SIGNALS_REPO"]
          os.makedirs("models", exist_ok=True)
          files = [
              "models/ncde_optionA_best.pt",
              "models/ncde_optionB_best.pt",
              "models/scaler_optionA.pkl",
              "models/scaler_optionB.pkl",
              "models/meta_optionA.json",
              "models/meta_optionB.json",
          ]
          for f in files:
              try:
                  local = hf_hub_download(
                      repo_id=repo, filename=f, repo_type="dataset",
                      token=token, local_dir=".", local_dir_use_symlinks=False,
                  )
                  print(f"Downloaded {f}")
              except Exception as e:
                  print(f"WARNING: Could not download {f}: {e}")
          EOF

      - name: Generate signals
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_SOURCE_REPO:  P2SAMAPA/p2-etf-deepm-data
          HF_SIGNALS_REPO: P2SAMAPA/p2-etf-ncde-engine-signals
        run: python update_daily.py --option both
