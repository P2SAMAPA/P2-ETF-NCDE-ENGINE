name: Daily Signal

# Mon–Fri 23:00 UTC — downloads existing model artifacts, runs the full
# signal pipeline (NCDE predict → conformal wrap → verify), no training.
#
# File layout produced:
#   models/conformal_params_option{A|B}.json   ← downloaded from HF (has "quantiles")
#   models/conformal_signal_option{A|B}.json   ← wrapped signal output
#   models/latest_signals_conformal.json        ← combined file for CI check

on:
  schedule:
    - cron: "0 23 * * 1-5"
  workflow_dispatch: {}

jobs:
  signal:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pred-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-pred-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Download model + conformal param artifacts from HF ──────────────────
      - name: Download artifacts
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import hf_hub_download
          import config as cfg

          os.makedirs(cfg.MODELS_DIR, exist_ok=True)

          # Model weights + metadata
          model_files = [
              "ncde_option{opt}_best.pt",
              "meta_option{opt}.json",
              "scaler_option{opt}.pkl",
          ]
          # Conformal calibration params (new name first, old name as fallback)
          conformal_files = [
              "conformal_params_option{opt}.json",   # new canonical name
          ]

          for opt in ["A", "B"]:
              for tmpl in model_files:
                  fname = tmpl.format(opt=opt)
                  try:
                      hf_hub_download(
                          repo_id=cfg.HF_SIGNALS_REPO,
                          filename=f"models/{fname}",
                          repo_type="dataset",
                          token=cfg.HF_TOKEN or None,
                          local_dir=".",
                          local_dir_use_symlinks=False,
                      )
                      print(f"  Downloaded models/{fname}")
                  except Exception as e:
                      print(f"  WARNING: Could not download models/{fname}: {e}")

              for tmpl in conformal_files:
                  fname   = tmpl.format(opt=opt)
                  hf_path = f"conformal/{fname}"
                  local   = os.path.join(cfg.MODELS_DIR, fname)
                  try:
                      hf_hub_download(
                          repo_id=cfg.HF_SIGNALS_REPO,
                          filename=hf_path,
                          repo_type="dataset",
                          token=cfg.HF_TOKEN or None,
                          local_dir=cfg.MODELS_DIR,
                          local_dir_use_symlinks=False,
                      )
                      print(f"  Downloaded {hf_path}")
                  except Exception:
                      # Fall back to old name if new name not uploaded yet
                      old_hf = f"conformal/conformal_option{opt}.json"
                      try:
                          hf_hub_download(
                              repo_id=cfg.HF_SIGNALS_REPO,
                              filename=old_hf,
                              repo_type="dataset",
                              token=cfg.HF_TOKEN or None,
                              local_dir=cfg.MODELS_DIR,
                              local_dir_use_symlinks=False,
                          )
                          print(f"  Downloaded (legacy) {old_hf}")
                      except Exception as e2:
                          print(f"  WARNING: No conformal params for Option {opt}: {e2}")

          print("Artifact download complete.")
          EOF

      # ── Generate raw NCDE signals ────────────────────────────────────────────
      - name: Generate NCDE signals
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python predict.py --option both

      # ── Wrap with conformal intervals ────────────────────────────────────────
      - name: Wrap signals with conformal intervals
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m conformal.predict_conformal --option both

      # ── Verify output ────────────────────────────────────────────────────────
      - name: Verify conformal signal output
        run: |
          python - <<'EOF'
          import json, os, sys
          path = "models/latest_signals_conformal.json"
          if not os.path.exists(path):
              print("ERROR: latest_signals_conformal.json not found")
              sys.exit(1)
          with open(path) as f:
              d = json.load(f)
          ok = False
          for key in ["option_A", "option_B"]:
              sig = d.get(key)
              if sig and sig.get("top_pick"):
                  iv = sig.get("top_interval_90", {})
                  print(f"  {key}: {sig['top_pick']}  mu={sig['top_mu']:.4f}  "
                        f"90% CI=[{iv.get('lo','?')}, {iv.get('hi','?')}]  "
                        f"signal_date={sig['signal_date']}")
                  ok = True
              else:
                  print(f"  {key}: no signal")
          if not ok:
              sys.exit(1)
          EOF

      # ── Commit signal artifacts ──────────────────────────────────────────────
      - name: Commit signal artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/latest_signals*.json \
                  models/conformal_signal_*.json \
                  models/signal_*.json || true
          git diff --cached --quiet || \
            git commit -m "chore: daily signal $(date -u +'%Y-%m-%d')"
          git push || true
