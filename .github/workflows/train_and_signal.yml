name: Train NCDE + Calibrate + Generate Signal

# Full pipeline: train → calibrate conformal → generate signals → verify
#
# File layout after this run:
#   models/conformal_params_option{A|B}.json   ← calibration params (has "quantiles")
#   models/conformal_signal_option{A|B}.json   ← wrapped signal output
#   models/latest_signals_conformal.json        ← combined CI check file
#
# The old conformal_option{X}.json files on HF are superseded by the new
# split naming scheme. predict_conformal.py falls back to them automatically
# for one cycle if they exist, then switches to the new names.

on:
  workflow_dispatch:
    inputs:
      option:
        description: "Which option to train (A / B / both)"
        required: false
        default: "both"
      score_type:
        description: "Conformal score type (absolute / normalised)"
        required: false
        default: "absolute"
  schedule:
    # Weekly retrain: Sunday 20:00 UTC
    - cron: "0 20 * * 0"

jobs:
  train-calibrate-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-train-${{ hashFiles('requirements_train.txt') }}
          restore-keys: ${{ runner.os }}-pip-train-

      - name: Install dependencies
        run: pip install -r requirements_train.txt

      # ── Step 1: Train ────────────────────────────────────────────────────────
      - name: Train NCDE models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python train.py --option ${{ github.event.inputs.option || 'both' }}

      # ── Step 2: Calibrate conformal params ───────────────────────────────────
      - name: Calibrate conformal intervals
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m conformal.calibrate \
            --option ${{ github.event.inputs.option || 'both' }} \
            --score_type ${{ github.event.inputs.score_type || 'absolute' }}

      # ── Step 3: Generate raw NCDE signals ───────────────────────────────────
      - name: Generate NCDE signals
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python predict.py --option ${{ github.event.inputs.option || 'both' }}

      # ── Step 4: Wrap with conformal intervals ────────────────────────────────
      - name: Wrap signals with conformal intervals
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m conformal.predict_conformal \
            --option ${{ github.event.inputs.option || 'both' }}

      # ── Step 5: Verify output ────────────────────────────────────────────────
      - name: Verify conformal signal output
        run: |
          python - <<'EOF'
          import json, os, sys
          path = "models/latest_signals_conformal.json"
          if not os.path.exists(path):
              print("ERROR: latest_signals_conformal.json not found")
              sys.exit(1)
          with open(path) as f:
              d = json.load(f)
          ok = False
          for key in ["option_A", "option_B"]:
              sig = d.get(key)
              if sig and sig.get("top_pick"):
                  iv = sig.get("top_interval_90", {})
                  print(f"  {key}: {sig['top_pick']}  mu={sig['top_mu']:.4f}  "
                        f"90% CI=[{iv.get('lo','?')}, {iv.get('hi','?')}]  "
                        f"signal_date={sig['signal_date']}")
                  ok = True
              else:
                  print(f"  {key}: no signal")
          if not ok:
              sys.exit(1)
          EOF

      # ── Step 6: Commit artifacts ─────────────────────────────────────────────
      - name: Commit artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/ || true
          git diff --cached --quiet || \
            git commit -m "chore: retrain + calibrate + signal $(date -u +'%Y-%m-%d')"
          git push || true
