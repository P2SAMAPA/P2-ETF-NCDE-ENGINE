name: Daily Conformal Signals

on:
  schedule:
    - cron: "5 23 * * 1-5"
  workflow_dispatch:

jobs:
  conformal-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run conformal predict (safe)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Running conformal prediction (safe mode)"

          # Run Option A (don't fail workflow if missing)
          python -m conformal.predict_conformal --option A || echo "Option A failed"

          # Run Option B (don't fail workflow if missing)
          python -m conformal.predict_conformal --option B || echo "Option B failed"

      - name: Check output
        run: |
          if [ -f models/latest_signals_conformal.json ]; then
            echo "✓ Conformal signals generated"
            cat models/latest_signals_conformal.json
          else
            echo "⚠ No conformal output generated (likely missing calibration)"
          fi
