name: Daily Conformal Signals

on:
  schedule:
    - cron: "5 23 * * 1-5"
  workflow_dispatch:

jobs:
  conformal-predict:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run conformal predict
        run: python -m conformal.predict_conformal --option both

      - name: Check output
        run: |
          if [ -f models/latest_signals_conformal.json ]; then
            echo "SUCCESS: file exists"
          else
            echo "ERROR: file missing"
            exit 1
          fi
