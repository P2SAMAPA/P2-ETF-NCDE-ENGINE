name: Train NCDE Models

on:
  workflow_dispatch:
    inputs:
      option:
        description: 'Option to train (A, B, or both)'
        required: true
        default: 'both'
        type: choice
        options: [A, B, both]

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_train.txt

      - name: Validate dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python validate_dataset.py

      - name: Train NCDE models
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_SOURCE_REPO:  P2SAMAPA/p2-etf-deepm-data
          HF_SIGNALS_REPO: P2SAMAPA/p2-etf-ncde-engine-signals
        run: python train.py --option ${{ github.event.inputs.option }}

      - name: Upload models to HF
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_SIGNALS_REPO: P2SAMAPA/p2-etf-ncde-engine-signals
        run: |
          python - <<'EOF'
          import os, glob
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = os.environ["HF_SIGNALS_REPO"]
          for f in glob.glob("models/*.pt") + glob.glob("models/*.pkl") + glob.glob("models/meta_*.json"):
              fname = os.path.basename(f)
              api.upload_file(
                  path_or_fileobj=f,
                  path_in_repo=f"models/{fname}",
                  repo_id=repo,
                  repo_type="dataset",
                  commit_message=f"Upload trained model: {fname}",
              )
              print(f"Uploaded {fname}")
          EOF

      - name: Generate initial signals
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_SOURCE_REPO:  P2SAMAPA/p2-etf-deepm-data
          HF_SIGNALS_REPO: P2SAMAPA/p2-etf-ncde-engine-signals
        run: python predict.py --option ${{ github.event.inputs.option }}
